name: IRENE
options:
  bundleIdPrefix: com.passionsperfected
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
  xcodeVersion: "16.0"
  groupSortPosition: top
  generateEmptyDirectories: true
  createIntermediateGroups: true

packages:
  swift-markdown:
    url: https://github.com/apple/swift-markdown.git
    from: "0.4.0"

targets:
  IRENE_macOS:
    type: application
    platform: macOS
    sources:
      - path: IRENE
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.passionsperfected.irene
        PRODUCT_NAME: IRENE
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: true
        SWIFT_STRICT_CONCURRENCY: complete
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "IRENE needs microphone access to record audio for meeting transcription."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "IRENE uses speech recognition to transcribe your recordings."
        INFOPLIST_KEY_NSCalendarsUsageDescription: "IRENE integrates with your calendar to show and create events."
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "IRENE uses Apple Events to read and send email through Mail.app."
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
    dependencies:
      - package: swift-markdown
        product: Markdown
    entitlements:
      path: IRENE/Resources/IRENE.entitlements
      properties:
        # Sandbox is intentionally OFF. IRENE needs unsandboxed access to:
        #   * spawn `gh` and `appleconnect` CLI helpers (Process)
        #   * read user-supplied PEM certificate files at any path
        #   * read/write configs under ~/__ai/irene_configs/
        #   * outbound mTLS to Apple's internal AI gateway (Floodgate)
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.device.audio-input: true
        com.apple.security.personal-information.calendars: true
        com.apple.security.automation.apple-events: true
        com.apple.security.temporary-exception.apple-events:
          - com.apple.mail

  IRENE_iOS:
    type: application
    platform: iOS
    sources:
      - path: IRENE
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.passionsperfected.irene
        PRODUCT_NAME: IRENE
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: true
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: true
        SWIFT_STRICT_CONCURRENCY: complete
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
    dependencies:
      - package: swift-markdown
        product: Markdown

  IRENETests_macOS:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: IRENETests
    dependencies:
      - target: IRENE_macOS
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/IRENE.app/Contents/MacOS/IRENE"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: true

  IRENETests_iOS:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: IRENETests
    dependencies:
      - target: IRENE_iOS
    settings:
      base:
        SWIFT_VERSION: "6.0"
